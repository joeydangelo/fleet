<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf9f7"/>

  <!-- Dot grid texture -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="rgba(0,0,0,0.045)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="245" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#1a1a1a">Fleet</text>

  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#6b6560">Parallel AI agents, isolated worktrees, merged results.</text>

  <!-- Install command pill -->
  <rect x="390" y="390" width="420" height="48" rx="8" fill="#f2f0ec" stroke="#d4d0ca" stroke-width="1"/>
  <text x="600" y="420" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="18" font-weight="400" fill="#3d3d3d">$ npm install -g get-fleet@latest</text>

  <!-- Bottom accent line -->
  <rect x="560" y="490" width="80" height="3" rx="1.5" fill="#d97757"/>
</svg>
