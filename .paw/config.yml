# Documentation cache configuration.
# files: Maps destination paths (relative to .paw/docs/) to source locations.
#   Sources can be:
#   - internal: prefix for bundled docs (e.g., "internal:shortcuts/build-task.md")
#   - Full URL for external docs (e.g., "https://raw.githubusercontent.com/org/repo/main/file.md")
# lookup_path: Search paths for doc lookup (like shell $PATH). Earlier paths take precedence.
#
# To sync docs: paw init
#
# Auto-sync: Docs are automatically synced when stale (default: every 24 hours).
# Configure with settings.doc_auto_sync_hours (0 = disabled).
docs_cache:
  files:
    guidelines/commit-conventions.md: internal:guidelines/commit-conventions.md
    guidelines/general-tdd-guidelines.md: internal:guidelines/general-tdd-guidelines.md
    guidelines/general-testing-rules.md: internal:guidelines/general-testing-rules.md
    guidelines/paw-task-decomposition.md: internal:guidelines/paw-task-decomposition.md
    guidelines/typescript-testing-guidelines.md: internal:guidelines/typescript-testing-guidelines.md
    shortcuts/build-task.md: internal:shortcuts/build-task.md
    shortcuts/from-github-issue.md: internal:shortcuts/from-github-issue.md
    shortcuts/from-issues.md: internal:shortcuts/from-issues.md
    shortcuts/generate-paw-yaml.md: internal:shortcuts/generate-paw-yaml.md
    shortcuts/getting-started.md: internal:shortcuts/getting-started.md
    shortcuts/orchestrate-agents.md: internal:shortcuts/orchestrate-agents.md
    shortcuts/precommit-process.md: internal:shortcuts/precommit-process.md
    shortcuts/resolve-merge-conflict.md: internal:shortcuts/resolve-merge-conflict.md
    shortcuts/setup-github-cli.md: internal:shortcuts/setup-github-cli.md
    shortcuts/setup-tmux.md: internal:shortcuts/setup-tmux.md
    shortcuts/to-pr.md: internal:shortcuts/to-pr.md
    templates/agent-brief.md: internal:templates/agent-brief.md
    templates/orchestrator-brief.md: internal:templates/orchestrator-brief.md
    templates/paw-yaml.md: internal:templates/paw-yaml.md
    templates/skill.md: internal:templates/skill.md
    templates/task-summary.md: internal:templates/task-summary.md
  lookup_path:
    - .paw/docs/shortcuts
    - .paw/docs/guidelines
    - .paw/docs/templates
settings:
  doc_auto_sync_hours: 24
