# Doc manifest — tracks doc sources and sync settings.
# files: Maps destination paths (relative to .paw/docs/) to source locations.
#   Sources can be:
#   - internal: prefix for bundled docs (e.g., "internal:shortcuts/build-task.md")
#   - Full URL for external docs (e.g., "https://raw.githubusercontent.com/org/repo/main/file.md")
# lookup_path: Search paths for doc lookup (like shell $PATH). Earlier paths take precedence.
#
# To sync docs: paw init
#
# Auto-sync: Docs are automatically synced when stale (default: every 24 hours).
# Configure with settings.doc_auto_sync_hours (0 = disabled).
docs_cache:
  files:
    guidelines/code-comments.md: internal:guidelines/code-comments.md
    guidelines/code-quality.md: internal:guidelines/code-quality.md
    guidelines/commit-conventions.md: internal:guidelines/commit-conventions.md
    guidelines/error-handling.md: internal:guidelines/error-handling.md
    guidelines/security-patterns.md: internal:guidelines/security-patterns.md
    guidelines/spec-planning.md: internal:guidelines/spec-planning.md
    guidelines/task-decomposition.md: internal:guidelines/task-decomposition.md
    guidelines/test-driven-development.md: internal:guidelines/test-driven-development.md
    guidelines/test-quality.md: internal:guidelines/test-quality.md
    guidelines/testing-anti-patterns.md: internal:guidelines/testing-anti-patterns.md
    shortcuts/assess-work.md: internal:shortcuts/assess-work.md
    shortcuts/build-task.md: internal:shortcuts/build-task.md
    shortcuts/decompose-work.md: internal:shortcuts/decompose-work.md
    shortcuts/finish-branch.md: internal:shortcuts/finish-branch.md
    shortcuts/resolve-merge-conflict.md: internal:shortcuts/resolve-merge-conflict.md
    shortcuts/review-pr.md: internal:shortcuts/review-pr.md
    shortcuts/write-spec.md: internal:shortcuts/write-spec.md
    templates/paw-yaml.md: internal:templates/paw-yaml.md
    templates/plan-spec.md: internal:templates/plan-spec.md
    templates/summary-template.md: internal:templates/summary-template.md
  lookup_path:
    - .paw/docs/shortcuts
    - .paw/docs/guidelines
    - .paw/docs/templates
settings:
  doc_auto_sync_hours: 24
